[MODEL]
NAME=new_driver
POSITION=0,0,0

[STEER_ANIMATION]
NAME=steer.ksanim
LOCK=450

[SHIFT_ANIMATION]
BLEND_TIME=150 ; Time it takes the driver's hand to reach from the wheel towards the shifter.
POSITIVE_TIME=100 ; Time it takes to grab the shifter and change into gear
STATIC_TIME=20 ; How long the driver keeps their hand on the shifter
NEGATIVE_TIME=150 ; Time it takes the driver's hand to let go of the shifter and start heading back towards the wheel
PRELOAD_RPM=8000 ; The driver will reach for the shifter after the engine has exceeded this specified engine RPM, or take their hand off the shifter if you fall below this specified RPM.
INVERT_SHIFTING_HANDS=0  ; RHD cars


[HIDE_OBJECT_0]
NAME=DRIVER:HELMET_plastic


[HIDE_OBJECT_1]
NAME=DRIVER:GEO_Driver_FACE

[HIDE_OBJECT_2]
NAME=DRIVER:HELMET_SUB0

[HIDE_OBJECT_3]
NAME=DRIVER:HELMET_SUB1

[HIDE_OBJECT_4]
NAME=DRIVER:HELMET_GLASS_SUB0

[HIDE_OBJECT_5]
NAME=DRIVER:HELMET_GLASS_SUB1

[HIDE_OBJECT_6]
NAME=DRIVER:HELMET

[HIDE_OBJECT_7]
NAME=DRIVER:Driver_Body_SUB0

[HEAD_MOVEMENT]
FILTER=0.150000
MAX_G=1.100000
ROLL_MAX_DEG=-20
PITCH_MAX_DEG=-2
YAW_MAX_DEG=-35


[DRIVER3D_MODEL]
NAME=driver_80
POSITION=0.0,0.0,0.0
[DRIVER3D_HIDE_OBJECT_...]
NAME= DRIVER:GEO_Driver_FACE 
[DRIVER3D_HIDE_OBJECT_...]
NAME= DRIVER:Driver_Body_SUB0
[DRIVER3D_HIDE_OBJECT_...]
NAME= DRIVER:Driver_Body

[MODEL_REPLACEMENT_...]
FILE=driver_80.kn5
HIDE=DRIVER:Glass_1985, DRIVER:HELMET1985