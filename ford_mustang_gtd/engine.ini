[HEADER]
VERSION=1
TURBO_VERSION=1 
POWER_CURVE=engine_Ford_V8_Predator_GTD.lut
COAST_CURVE=FROM_COAST_REF 		; coast curve. can define 3 different options (coast reference, coast values for mathematical curve, coast curve file)

[ENGINE_DATA]
ALTITUDE_SENSITIVITY=0.1			; sensitivity to altitude
INERTIA=0.20					; engine inertia
LIMITER=7600					; engine rev limiter. 0 no limiter
LIMITER_HZ=15					; Frequency of engine limiter
MINIMUM=800						; Idle rpm
RESPONSE_TIME=0.11				; delay of response in seconds

[COAST_REF]
RPM=7600						; rev number reference
TORQUE=165.8  ;5.2L, 9.5:1		; engine braking torque value in Nm at rev number reference
NON_LINEARITY=0					; coast engine brake from ZERO to TORQUE value at rpm with linear (0) to fully exponential (1)

[COAST_DATA]
COAST0=0						 
COAST1=0
COAST=0.0000015

[COAST_CURVE]
FILENAME=coast.lut				; coasting curve file

[TURBO_0];	Roots-type supercharger
;2.3-liter 
LAG_DN=0.96
LAG_UP=0.94
MAX_BOOST=1
WASTEGATE=0
DISPLAY_MAX_BOOST=1
REFERENCE_RPM=1500
GAMMA=0.5
EXT_GAS_CURVE=(|0=0|0.3=0.7|0.5=1|1=1|)
COCKPIT_ADJUSTABLE=0
FLOW_ON_CUT=0.6

[THROTTLE_RESPONSE]
RPM_REFERENCE=7600
LUT=throttle2.lut

[DAMAGE]
TURBO_BOOST_THRESHOLD=1.40  ; level of TOTAL boost before the engine starts to take damage
TURBO_DAMAGE_K=5			; amount of damage per second per (boost - threshold)
RPM_THRESHOLD=8100			; RPM at which the engine starts to take damage
RPM_DAMAGE_K=1			; amount of damage per second per (rpm-threshold)