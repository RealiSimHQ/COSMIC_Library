[HEADER]
VERSION=3

[TRACTION]
TYPE=RWD					; Wheel drive. Possible options: FWD (Front Wheel Drive), RWD (Rear Wheel Drive)

[GEARS]
COUNT=8                ; forward gears number
GEAR_R=-2.63            ; rear gear ratio
; M1K 8-speed dual-clutch (DCT)
GEAR_1=2.91
GEAR_2=1.76
GEAR_3=1.22
GEAR_4=0.88
GEAR_5=0.65
GEAR_6=0.51
GEAR_7=0.40
GEAR_8=0.33
FINAL=5.65	; 5.56

[DIFFERENTIAL]
POWER=0.4		; differential lock under power. 1.0=100% lock - 0 0% lock
COAST=0.6			; differential lock under coasting. 1.0=100% lock 0=0% lock
PRELOAD=80			; preload torque setting

[GEARBOX]
CHANGE_UP_TIME=40			; change up time in milliseconds
CHANGE_DN_TIME=90		; change down time in milliseconds
AUTO_CUTOFF_TIME=60			; Auto cutoff time for upshifts in milliseconds, 0 to disable
SUPPORTS_SHIFTER=0		; 1=Car supports shifter, 0=car supports only paddles 
VALID_SHIFT_RPM_WINDOW=800			;range window additional to the precise rev matching rpm that permits gear engage.
CONTROLS_WINDOW_GAIN=0.4			;multiplayer for gas,brake,clutch pedals that permits gear engage on different rev matching rpm. the lower the more difficult.
INERTIA=0.019			; gearbox inertia. default values to 0.02 if not set

[CLUTCH]
MAX_TORQUE=1500

[AUTOCLUTCH]
UPSHIFT_PROFILE=UPSHIFT_PROFILE			; Name of the autoclutch profile for upshifts. NONE to disable autoclutch on shift up
DOWNSHIFT_PROFILE=DOWNSHIFT_PROFILE		; Same as above for downshifts
USE_ON_CHANGES=1						; Use the autoclutch on gear shifts even when autoclutch is set to off. Needed for cars with semiautomatic gearboxes. values 1,0
MIN_RPM=800							; Minimum rpm for autoclutch engadgement
MAX_RPM=1800							; Maximum rpm for autoclutch engadgement
FORCED_ON=1

[UPSHIFT_PROFILE]
POINT_0=15				; Time to reach fully depress clutch
POINT_1=30				; Time to start releasing clutch
POINT_2=60				; Time to reach fully released clutch

[DOWNSHIFT_PROFILE]
POINT_0=50				; Time to reach fully depress clutch
POINT_1=90				; Time to start releasing clutch
POINT_2=160				; Time to reach fully released clutch

[AUTOBLIP]
ELECTRONIC=1				; If =1 then it is a feature of the car and cannot be disabled
POINT_0=60				; Time to reach full level
POINT_1=100				; Time to start releasing gas
POINT_2=160			; Time to reach 0 gas
LEVEL=0.60				; Gas level to be reached

[DOWNSHIFT_PROTECTION]
ACTIVE=1
DEBUG=0
OVERREV=500
LOCK_N=1

[DAMAGE]
RPM_WINDOW_K=100

[AUTO_SHIFTER]
UP=7500		;gear change up
DOWN=4500	; gear change down
SLIP_THRESHOLD=0.7   ; slipratio delle ruote motrici che valuta quando cambiare marcia per non metterti in crisi
GAS_CUTOFF_TIME=0.080
