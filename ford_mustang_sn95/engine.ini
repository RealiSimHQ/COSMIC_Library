[HEADER]
VERSION=1
TURBO_VERSION=1 ;0 is AC, 1 is v1 CSP
POWER_CURVE=engine_FordModular4.6_4v_SC_700+.lut			; power curve file
COAST_CURVE=FROM_COAST_REF 		; coast curve. can define 3 different options (coast reference, coast values for mathematical curve, coast curve file)

[ENGINE_DATA]
ALTITUDE_SENSITIVITY=0.1		; sensitivity to altitude
INERTIA=0.250					; engine inertia
LIMITER=6600					; engine rev limiter. 0 no limiter
LIMITER_HZ=10					; Frequency of engine limiter
MINIMUM=600						; Idle rpm
DEFAULT_TURBO_ADJUSTMENT=1 		; DEFAULT turbo adjustment if one or more turbos are cockpit adjustable
RESPONSE_TIME=0.15 ; delay of response in seconds


[COAST_REF]
RPM=6600						; rev number reference
TORQUE=124.1  ;4.6L, 8.3:1		; 8.5:1 Stock
NON_LINEARITY=0					; coast engine brake from ZERO to TORQUE value at rpm with linear (0) to fully  exponential (1)

[COAST_DATA]
COAST0=0						; 
COAST1=0
COAST=0.0000015

[COAST_CURVE]
FILENAME=coast.lut				; coasting curve file

[TURBO_0]
LAG_DN=0.96
LAG_UP=0.94
MAX_BOOST=1.4
WASTEGATE=0
DISPLAY_MAX_BOOST=1.3575
REFERENCE_RPM=1500
GAMMA=1
EXT_GAS_CURVE=(|0=0|0.3=0.7|0.5=1|1=1|)
COCKPIT_ADJUSTABLE=0

[THROTTLE_RESPONSE]
RPM_REFERENCE=6600
LUT=throttle2.lut

[DAMAGE]
TURBO_BOOST_THRESHOLD=2.0  ; level of TOTAL boost before the engine starts to take damage
TURBO_DAMAGE_K=5			; amount of damage per second per (boost - threshold)
RPM_THRESHOLD=7500			; RPM at which the engine starts to take damage
RPM_DAMAGE_K=1	