[HEADER]  ;  gsr dogbox
VERSION=2


[TRACTION]
TYPE=RWD					; Wheel drive.

[GEARS]
COUNT=4
GEAR_R=-3.500
; 		calc	dg	;  actual . gsr common setup.
GEAR_1=2.48	
GEAR_2=1.68 	
GEAR_3=1.26 	
GEAR_4=1 	
FINAL=4.28

[GEARBOX]
CHANGE_UP_TIME=100		; change up time in milliseconds
CHANGE_DN_TIME=150		; change down time in milliseconds
AUTO_CUTOFF_TIME=150		; Auto cutoff time for upshifts in milliseconds, 0 to disable
SUPPORTS_SHIFTER=1		; 1=Car supports shifter, 0=car supports only paddles 
VALID_SHIFT_RPM_WINDOW=8000			;range window additional to the precise rev matching rpm that permits gear engage.
CONTROLS_WINDOW_GAIN=100.4			;multiplayer for gas,brake,clutch pedals that permits gear engage on different rev matching rpm. the lower the more difficult.
INERTIA=0.017							; gearbox inertia. default values to 0.02 if not set

[CLUTCH]
MAX_TORQUE=950
; Torque capacity in Nm, matched to Drenth MPG’s 950 Nm limit and 2JZ’s  output


[AUTOCLUTCH]
USE_ON_CHANGES=1
; No autoclutch for gear changes to simulate manual clutch in drifting
FORCED_ON=1
; No forced autoclutch for realistic drifting experience
MIN_RPM=1000
; Minimum RPM for autoclutch (if used, but disabled here)
MAX_RPM=3000
; Maximum RPM for autoclutch (if used, but disabled here)

[GEARBOX]
SUPPORTS_SHIFTER=1
; Enables sequential shifter support
SHIFTER_TYPE=SEQUENTIAL
; Defines the gearbox as sequential, matching Drenth MPG
SHIFT_TIME=150
; Shift time in milliseconds (150ms for quick sequential shifts typical in drifting)
UPSHIFT_RPM=7000
; Upshift RPM, set to 2JZ’s typical powerband peak (adjust based on your engine tune)
DOWNSHIFT_RPM=4000
; Downshift RPM, set to maintain turbo spool and wheel speed during drifts

CHANGE_UP_TIME=100		; change up time in milliseconds
CHANGE_DN_TIME=100		; change down time in milliseconds
AUTO_CUTOFF_TIME=150		; Auto cutoff time for upshifts in milliseconds, 0 to disable
VALID_SHIFT_RPM_WINDOW=9000			;range window additional to the precise rev matching rpm that permits gear engage.
CONTROLS_WINDOW_GAIN=100.4			;multiplayer for gas,brake,clutch pedals that permits gear engage on different rev matching rpm. the lower the more difficult.
INERTIA=0.017



[DIFFERENTIAL]
POWER=1			; differential lock under power. 1.0=100% lock - 0 0% lock
COAST=1			; differential lock under coasting. 1.0=100% lock 0=0% lock
PRELOAD=1			; preload torque setting



[UPSHIFT_PROFILE]
POINT_0=50				; Time to reach fully depress clutch
POINT_1=210				; Time to start releasing clutch
POINT_2=400				; Time to reach fully released clutch

[DOWNSHIFT_PROFILE]
POINT_0=50				; Time to reach fully depress clutch
POINT_1=180				; Time to start releasing clutch
POINT_2=1500				; Time to reach fully released clutch

[AUTOBLIP]
ELECTRONIC=0				; If =1 then it is a feature of the car and cannot be disabled
POINT_0=30				; Time to reach full level
POINT_1=160				; Time to start releasing gas
POINT_2=200			; Time to reach 0 gas
LEVEL=0.9				; Gas level to be reached

[DAMAGE]
RPM_WINDOW_K=100