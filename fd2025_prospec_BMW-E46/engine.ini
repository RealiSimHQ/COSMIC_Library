[HEADER]  ;dima e46
VERSION=1
POWER_CURVE=power.lut			; power curve file
COAST_CURVE=FROM_COAST_REF 		; coast curve. can define 3 different options (coast reference, coast values for mathematical curve, coast curve file)

[ENGINE_DATA]
INERTIA=0.25
MINIMUM=1100
LIMITER=7850
LIMITER_HZ=22
RPM_THRESHOLD=2500
ALTITUDE_SENSITIVITY=0.1
CHECK_ENGINE_LIGHT=0
DEFAULT_TURBO_ADJUSTMENT=1
RESPONSE_TIME=0.05
RESPONSE_RELEASE_TIME=0.05

[ALS]
ACTIVE=1; Controlled by Lua script (0=off, 1=on)
RPM_MIN=4500 ; Target RPM for ALS
FUEL_MULT=1.5 ; Increase fuel consumption for anti-lag effect (adjust for pops/bangs)
IGNITION_CUT=0.1 ; Slight ignition cut for turbo spool (adjust as needed)

[POWER]
LUT_FILE=power.lut



[TURBO_0]
LAG_DN=0.985
LAG_UP=0.9965
MAX_BOOST=1.8             ; 1.8 bar boost maximum
WASTEGATE=1.7             ; Wastegate opens at 1.7 bar to limit to 1.8 bar
DISPLAY_MAX_BOOST=2       ; No display override
REFERENCE_RPM=4300        ; Reference RPM for max boost, matching torque peak
GAMMA=1
COCKPIT_ADJUSTABLE=1      ; No in-game adjustment








[COAST_REF]
RPM=8200						; rev number reference
TORQUE=165						; engine braking torque value in Nm at rev number reference
NON_LINEARITY=0					; coast engine brake from ZERO to TORQUE value at rpm with linear (0) to fully exponential (1)

[COAST_DATA]
COAST0=0						; 
COAST1=0
COAST=0.0000015

[COAST_CURVE]
FILENAME=coast.lut				; coasting curve file

[DAMAGE]
TURBO_BOOST_THRESHOLD=2.40  ; level of TOTAL boost before the engine starts to take damage
TURBO_DAMAGE_K=5			; amount of damage per second per (boost - threshold)
RPM_THRESHOLD=8200			; RPM at which the engine starts to take damage
RPM_DAMAGE_K=1			; amount of damage per second per (rpm-threshold)







